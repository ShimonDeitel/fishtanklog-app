name: FishtankLog
options:
  bundleIdPrefix: com.shimondeitel.fishtanklog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FishtankLog:
    type: application
    platform: iOS
    sources:
      - path: FishtankLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fishtanklog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FishtankLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FishtankLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FishtankLogTests
      - path: FishtankLog.storekit
    dependencies:
      - target: FishtankLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fishtanklog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FishtankLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FishtankLogUITests
    dependencies:
      - target: FishtankLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fishtanklog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FishtankLog:
    build:
      targets:
        FishtankLog: all
        FishtankLogTests: [test]
        FishtankLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: FishtankLog.storekit
    test:
      config: Debug
      storeKitConfiguration: FishtankLog.storekit
      targets:
        - FishtankLogTests
        - FishtankLogUITests
    archive:
      config: Release
